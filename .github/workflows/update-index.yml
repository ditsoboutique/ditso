# =============================================================
# DITSÖ — GitHub Action: Auto-update productos-index.json
# Se ejecuta cuando el CMS guarda un producto o manualmente.
# =============================================================

name: Update Products Index

on:
  push:
    branches: [main]
    paths:
      - 'content/productos/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-index:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Regenerate productos-index.json
        run: node build-index.js

      - name: Commit and push if changed
        run: |
          git config user.name "Ditsö Bot"
          git config user.email "bot@ditso.cr"
          git add content/productos-index.json
          if git diff --staged --quiet; then
            echo "Index already up to date."
          else
            git commit -m "Auto-update productos-index.json"
            git push
          fi
