# =============================================================
# DITSÖ — GitHub Action: Auto-update content indexes
# Se ejecuta cuando el CMS guarda un producto o un tip,
# o manualmente desde la pestaña Actions.
# =============================================================

name: Update Products Index

on:
  push:
    branches: [main]
    paths:
      - 'content/productos/**'
      - 'content/tips/**'
  workflow_dispatch:

permissions:
  contents: write
  issues: write    # necesario para crear issue en caso de fallo

jobs:
  update-index:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Regenerate index files (productos + tips)
        run: node build-index.js

      - name: Commit and push if changed
        run: |
          git config user.name "Ditsö Bot"
          git config user.email "bot@ditso.cr"
          git add content/productos-index.json content/tips-index.json \
                  content/productos-bundle.json content/tips-bundle.json
          if git diff --staged --quiet; then
            echo "Indexes and bundles already up to date."
          else
            git commit -m "Auto-update content indexes and bundles"
            git push
          fi

      # ── NOTIFICACIÓN DE FALLO ─────────────────────────────
      # Si cualquier paso anterior falla, crea un Issue en el
      # repo automáticamente. GitHub envía un email de notif
      # a todos los colaboradores con acceso al repo.
      # ──────────────────────────────────────────────────────
      - name: Notify failure via GitHub Issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const commitUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/commit/${context.sha}`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '❌ Action fallida: productos/tips no se actualizaron',
              body: [
                '## ⚠️ El Action de actualización automática falló',
                '',
                'Un producto o tip fue guardado en el CMS pero el índice **no se regeneró**.',
                'Esto significa que el cambio **no aparecerá en el sitio** hasta que se corrija.',
                '',
                `**Commit:** ${commitUrl}`,
                `**Run:** ${runUrl}`,
                '',
                '### Qué hacer',
                '1. Abrir el enlace de "Run" arriba y ver qué paso falló',
                '2. Corregir el problema (usualmente un JSON malformado en `content/`)',
                '3. Ir a Actions → "Update Products Index" → "Run workflow" para reintentar',
                '',
                '*Este issue fue creado automáticamente por GitHub Actions.*'
              ].join('\n'),
              labels: ['bug', 'automation']
            });