backend:
  name: github
  repo: ditsoboutique/ditso
  branch: main
  base_url: https://ditso-oauth.ditsoboutiquecr.workers.dev
  auth_endpoint: /auth

media_folder: "assets/productos"
public_folder: "/ditso/assets/productos"

locale: es

collections:
  - name: "productos"
    label: "Productos"
    label_singular: "Producto"
    folder: "content/productos"
    format: json
    extension: json
    create: true
    delete: true
    slug: "{{id}}"
    identifier_field: id
    summary: "{{name}} — ₡{{price}}"
    fields:
      - label: "ID (sin espacios, ej: blusa-lino-natural)"
        name: "id"
        widget: "string"
        pattern: ['^[a-z0-9-]+$', "Use solo letras minúsculas, números y guiones"]
      - { label: "Nombre", name: "name", widget: "string" }
      - label: "Categoría"
        name: "category"
        widget: "select"
        options:
          - { label: "Blusas",      value: "blusas" }
          - { label: "Vestidos",    value: "vestidos" }
          - { label: "Pantalones",  value: "pantalones" }
          - { label: "Accesorios",  value: "accesorios" }
          - { label: "Ropa Cómoda", value: "ropa-comoda" }
      - label: "Etiqueta categoría"
        name: "categoryLabel"
        widget: "select"
        options:
          - { label: "Blusas",      value: "Blusas" }
          - { label: "Vestidos",    value: "Vestidos" }
          - { label: "Pantalones",  value: "Pantalones" }
          - { label: "Accesorios",  value: "Accesorios" }
          - { label: "Ropa Cómoda", value: "Ropa Cómoda" }
      - { label: "Descripción", name: "description", widget: "text" }
      - { label: "Precio (₡)", name: "price", widget: "number", value_type: "int" }
      - { label: "Precio original (₡)", name: "priceOriginal", widget: "number", value_type: "int", required: false }
      - { label: "Foto", name: "image", widget: "image", required: false }
      - { label: "En Oferta", name: "inOffer", widget: "boolean", default: false }
      - { label: "Visible", name: "active", widget: "boolean", default: true }

  - name: "configuracion"
    label: "Configuracion"
    files:
      - label: "Contacto"
        name: "contacto"
        file: "content/config/contacto.json"
        fields:
          - { label: "WhatsApp", name: "whatsappNumber", widget: "string" }
          - { label: "Email", name: "storeEmail", widget: "string" }
          - { label: "Mensaje WhatsApp", name: "whatsappMessage", widget: "text" }

  - name: "hero"
    label: "Inicio"
    files:
      - label: "Imagen principal"
        name: "hero"
        file: "content/config/hero.json"
        fields:
          - { label: "Foto principal", name: "heroImage", widget: "image", required: false, media_folder: "assets/hero", public_folder: "/ditso/assets/hero" }