# =============================================================
# DITSÖ — Decap CMS Configuration
# Backend: GitHub con PKCE (sin servidor OAuth — más simple)
# =============================================================

backend:
  name: github
  repo: ditsoboutique/ditso
  branch: main
  auth_type: pkce
  app_id: Ov23li6F4qqiRR6SZqK2

media_folder: "assets/productos"
public_folder: "/ditso/assets/productos"

locale: es

collections:

  - name: "productos"
    label: "Productos"
    label_singular: "Producto"
    folder: "content/productos"
    create: true
    delete: true
    slug: "{{id}}"
    identifier_field: name
    summary: "{{name}} — ₡{{price}}"

    fields:
      - label: "ID del producto"
        name: "id"
        widget: "string"
        hint: "Solo letras minúsculas y guiones. Ej: blusa-lino-natural."

      - label: "Nombre del producto"
        name: "name"
        widget: "string"

      - label: "Categoría"
        name: "category"
        widget: "select"
        options:
          - { label: "Blusas",      value: "blusas" }
          - { label: "Vestidos",    value: "vestidos" }
          - { label: "Pantalones",  value: "pantalones" }
          - { label: "Accesorios",  value: "accesorios" }
          - { label: "Ropa Cómoda", value: "ropa-comoda" }

      - label: "Etiqueta de categoría"
        name: "categoryLabel"
        widget: "select"
        options:
          - { label: "Blusas",      value: "Blusas" }
          - { label: "Vestidos",    value: "Vestidos" }
          - { label: "Pantalones",  value: "Pantalones" }
          - { label: "Accesorios",  value: "Accesorios" }
          - { label: "Ropa Cómoda", value: "Ropa Cómoda" }

      - label: "Descripción"
        name: "description"
        widget: "text"

      - label: "Precio (₡ colones)"
        name: "price"
        widget: "number"
        value_type: "int"

      - label: "Precio original (₡) — solo si está en oferta"
        name: "priceOriginal"
        widget: "number"
        value_type: "int"
        required: false

      - label: "Foto del producto"
        name: "image"
        widget: "image"
        required: false
        hint: "Tamaño ideal: 800x1000px. JPG o WebP. Máximo 500KB."

      - label: "Mostrar en sección Ofertas"
        name: "inOffer"
        widget: "boolean"
        default: false

      - label: "Visible en la tienda"
        name: "active"
        widget: "boolean"
        default: true

  - name: "configuracion"
    label: "Configuracion del Sitio"
    files:
      - label: "WhatsApp y Contacto"
        name: "contacto"
        file: "content/config/contacto.json"
        fields:
          - label: "Numero de WhatsApp"
            name: "whatsappNumber"
            widget: "string"
          - label: "Correo electronico"
            name: "storeEmail"
            widget: "string"
          - label: "Mensaje WhatsApp"
            name: "whatsappMessage"
            widget: "text"

  - name: "hero"
    label: "Pagina de Inicio"
    files:
      - label: "Imagen principal"
        name: "hero"
        file: "content/config/hero.json"
        fields:
          - label: "Fotografia principal"
            name: "heroImage"
            widget: "image"
            required: false
            media_folder: "assets/hero"
            public_folder: "/ditso/assets/hero"