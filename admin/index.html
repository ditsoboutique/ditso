<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <!-- CSP más permisiva para el admin — Decap CMS requiere unsafe-eval para parsear YAML -->
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self' 'unsafe-inline' 'unsafe-eval' https://identity.netlify.com https://unpkg.com;
    style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://unpkg.com;
    font-src 'self' https://fonts.gstatic.com https://unpkg.com data:;
    img-src 'self' data: blob: https:;
    connect-src 'self' https://*.netlify.com https://*.netlify.app blob:;
    frame-src 'self' https://unpkg.com;
    worker-src 'self' blob:;
  ">
  <title>Ditsö — Panel de Administración</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
</body>
</html>
